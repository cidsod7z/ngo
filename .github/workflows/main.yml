name: Essential Test
'on':
  push: null
  pull_request: null
  schedule:
  - cron: 0 18 * * *
concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.event.pull_request.number
    }}
  cancel-in-progress: true
jobs:
  Make_test_on_ubuntu:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v1
      with:
        submodules: true
    - uses: ./.github/workflows/composite_action/sim
      with:
        container-name: ${{ github.job }}
        build-envs: OCCLUM_RELEASE_BUILD=1
    - name: Check format
      run: docker exec ${{ github.job }} bash -c 'cd /root/occlum; info=$(make format-check);
        if [[ -n $info ]]; then echo "Format error detected."; echo "$info"; exit
        1; fi'
    - name: Integration test
      run: docker exec ${{ github.job }} bash -c "cd /root/occlum; OCCLUM_LOG_LEVEL=trace
        SGX_MODE=SIM make test"
    - name: Integration test with Glibc
      run: docker exec ${{ github.job }} bash -c "cd /root/occlum; OCCLUM_LOG_LEVEL=trace
        SGX_MODE=SIM make test-glibc"
    - name: Show failed cases
      if: ${{ failure() }}
      run: docker exec ${{ github.job }} bash -c "cat /root/occlum/build/test/.fail"
