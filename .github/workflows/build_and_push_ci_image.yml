name: Build Image for CI (Manual Trigger)
'on':
  workflow_dispatch:
    inputs:
      image_name:
        description: image name (must choose from <grpc, gvisor_test, openvino, python,
          tf_serving>)
        required: true
        default: grpc
      tag:
        description: image tag
        required: true
        default: latest
jobs:
  Build_grpc_image:
    runs-on: ubuntu-latest
    if: github.event.inputs.image_name == 'grpc'
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
    - name: Get occlum version
      run: echo "OCCLUM_VERSION=$(grep 'Version =' src/pal/include/occlum_version.h
        | awk '{print $4}')" >> $GITHUB_ENV;
    - name: Get branch name
      run: echo "OCCLUM_BRANCH=$(echo ${GITHUB_REF##*/})" >> $GITHUB_ENV;
    - name: Copy context for docker build
      run: 'cp -r tools/docker .

        '
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v1
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1
      with:
        driver-opts: env.BUILDKIT_STEP_LOG_MAX_SIZE=104857600
    - name: Login to DockerHub
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Build and push
      uses: docker/build-push-action@v2
      with:
        context: .
        file: ./tools/docker/ci/Dockerfile.grpc
        platforms: linux/amd64
        build-args: '"OCCLUM_VERSION=${{ env.OCCLUM_VERSION }}"

          "OCCLUM_BRANCH=${{ env.OCCLUM_BRANCH }}"

          '
        push: true
        tags: occlumbackup/ngo:${{ github.event.inputs.tag }}-ubuntu20.04-grpc
